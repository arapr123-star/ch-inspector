<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CH Swab">
<meta name="theme-color" content="#14110C">
<link rel="apple-touch-icon" href="./assets/apple-touch-icon.png">
<title>CH Swab</title>
<style>
  :root{--ink:#14110C;--ink2:#1E1A12;--card:#221D14;--line:#3A3326;--gold:#C6A861;--gold-deep:#A2823B;--ivory:#F5F0E6;--muted:#A99C7E;--bad:#B5483B;--r:14px;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:var(--ink);color:var(--ivory);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;}
  body{padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}
  button{font:inherit;color:inherit;cursor:pointer;}input,select,textarea{font:inherit;}
  .hidden{display:none!important;}
  .bar{position:sticky;top:0;z-index:20;background:rgba(20,17,12,.92);backdrop-filter:saturate(160%) blur(10px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;padding:12px 16px;}
  .bar .coin{width:30px;height:30px;}.bar .coin img{width:100%;height:100%;object-fit:contain;}
  .bar .title{font-weight:700;letter-spacing:.18em;text-transform:uppercase;font-size:13px;}
  .bar .sub{font-size:11px;color:var(--muted);letter-spacing:.04em;}
  .bar .sp{flex:1;}
  .back{font-size:14px;color:var(--gold);background:none;border:none;padding:8px 4px;}
  .iconbtn{width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:var(--card);display:flex;align-items:center;justify-content:center;font-size:16px;}
  .wrap{max-width:760px;margin:0 auto;padding:16px 16px 120px;}
  h2{font-size:22px;font-weight:700;margin:6px 0 2px;}
  .lead{color:var(--muted);font-size:13.5px;line-height:1.5;margin:0 0 14px;}
  .label{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-deep);margin:18px 0 8px;font-weight:700;display:flex;align-items:center;}
  .label .sp{flex:1;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:12px;}
  .field{margin-bottom:12px;}.field:last-child{margin-bottom:0;}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;letter-spacing:.03em;}
  .field input,.field select,.field textarea{width:100%;background:var(--ink2);border:1px solid var(--line);color:var(--ivory);border-radius:10px;padding:13px 14px;font-size:16px;outline:none;}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold);}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:600;min-height:52px;}
  .btn.primary{background:linear-gradient(180deg,#D2B570,#C6A861);color:#1b1610;}
  .btn.ink{background:var(--ink2);border:1px solid var(--line);color:var(--ivory);}
  .btn.ghost{background:none;border:1px dashed var(--line);color:var(--gold);}
  .btn.sm{min-height:44px;padding:11px 14px;font-size:14px;width:auto;}
  .fab{position:fixed;left:16px;right:16px;bottom:calc(16px + env(safe-area-inset-bottom));max-width:728px;margin:0 auto;z-index:30;}
  .meta-line{font-size:12px;color:var(--muted);line-height:1.6;}
  .meta-line b{color:var(--ivory);font-weight:600;}
  .gpsbar{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:10px 12px;margin:2px 0 8px;font-size:12.5px;}
  .gpsbar .pin{flex:1;color:var(--ivory);}.gpsbar .pin small{color:var(--muted);}
  .gpsbar .gpsbtn{background:var(--ink2);border:1px solid var(--line);color:var(--gold);border-radius:8px;padding:7px 11px;font-size:12px;min-height:40px;}
  .samp{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:12px;margin-bottom:10px;display:flex;gap:12px;}
  .samp img{width:70px;height:70px;border-radius:10px;object-fit:cover;border:1px solid var(--line);background:#000;flex:none;}
  .samp .d{flex:1;min-width:0;}
  .samp .sid{font-weight:700;font-size:15px;color:var(--gold);}
  .samp .loc{font-size:13px;margin-top:2px;}
  .samp .sub2{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.4;}
  .samp .del{color:var(--bad);background:none;border:none;font-size:12px;align-self:flex-start;}
  .tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.05em;padding:2px 8px;border-radius:20px;border:1px solid var(--line);color:var(--muted);margin-top:4px;}
  .sigwrap{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .sigbox{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px;}
  .sigbox .k{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-deep);font-weight:700;margin-bottom:7px;}
  .sigcanvas{width:100%;height:110px;background:#fff;border-radius:8px;touch-action:none;display:block;}
  .sigbox .clr{background:none;border:none;color:var(--gold);font-size:12px;margin-top:5px;padding:2px;}
  .modal{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;}
  .sheet{background:var(--ink2);border-top-left-radius:20px;border-top-right-radius:20px;width:100%;max-width:760px;margin:0 auto;padding:18px 16px calc(20px + env(safe-area-inset-bottom));border-top:1px solid var(--line);max-height:88vh;overflow:auto;}
  .sheet h3{margin:4px 0 14px;font-size:17px;}
  .toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:#000;color:#fff;border:1px solid var(--line);padding:11px 16px;border-radius:24px;font-size:13px;z-index:99;max-width:90%;text-align:center;}
  .tiny{font-size:11px;color:var(--muted);line-height:1.5;}
  a{color:var(--gold);}
</style>
</head>
<body>

<!-- ========== CAPTURE ========== -->
<section id="screen-cap">
  <div class="bar">
    <button class="back" onclick="location.href='./index.html'" aria-label="Back to Inspector" style="padding-right:2px">‹</button>
    <div class="coin"><img src="./assets/coin_gold.png" alt=""></div>
    <div><div class="title">CH Swab</div><div class="sub">Sampling &middot; chain of custody</div></div>
    <div class="sp"></div>
    <button class="iconbtn" onclick="editDetails()" aria-label="Details">✎</button>
  </div>
  <div class="wrap">
    <h2 id="cap-site">Swab sampling</h2>
    <p class="lead" id="cap-meta">Set the site details, then add each swab.</p>

    <div id="gps"></div>

    <div class="label">Swab samples <span class="sp"></span><span id="samp-count" class="tiny"></span></div>
    <div id="samples"></div>
    <div id="samp-empty" class="tiny" style="margin-bottom:10px">No samples yet. Tap the button below to capture the first swab.</div>

    <div class="label">Chain of custody &middot; signatures</div>
    <div class="sigwrap">
      <div class="sigbox">
        <div class="k">Collected by (Cleanaholics)</div>
        <canvas class="sigcanvas" id="sig-col"></canvas>
        <button class="clr" onclick="clearSig('col')">Clear</button>
      </div>
      <div class="sigbox">
        <div class="k">Received by (UKM)</div>
        <canvas class="sigcanvas" id="sig-rec"></canvas>
        <button class="clr" onclick="clearSig('rec')">Clear</button>
      </div>
    </div>
    <div class="field" style="margin-top:10px"><label>UKM receiver — name &amp; matric no.</label><input id="rec-name" placeholder="e.g. Nur Aisyah · A123456" onchange="setRec(this.value)"></div>

    <div style="margin-top:16px"><button class="btn ghost" onclick="resetSession()">Start a new record</button></div>
  </div>
  <button class="btn primary fab" onclick="addSwab()">＋ Add swab sample</button>
</section>

<!-- ========== RECORD ========== -->
<section id="screen-rec" class="hidden">
  <div class="bar">
    <button class="back" onclick="show('cap')">‹ Back</button>
    <div class="sp"></div>
    <button class="btn sm ink" onclick="window.print()">Print</button>
    <button class="btn sm primary" style="margin-left:8px" onclick="exportPdf()">PDF</button>
  </div>
  <div id="rec-host" class="wrap"></div>
</section>

<div id="toast" class="toast hidden"></div>
<div id="modal-host"></div>
<input id="cam" type="file" accept="image/*" capture="environment" class="hidden">

<script>
/* ===== IndexedDB (single session) ===== */
const DB=(()=>{let p;function open(){if(!p)p=new Promise((res,rej)=>{const r=indexedDB.open('ch-swab',1);
  r.onupgradeneeded=()=>{if(!r.result.objectStoreNames.contains('kv'))r.result.createObjectStore('kv',{keyPath:'k'});};
  r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});return p;}
  const tx=m=>open().then(db=>db.transaction('kv',m).objectStore('kv'));
  return{put:(k,v)=>tx('readwrite').then(s=>new Promise((res,rej)=>{const q=s.put({k,v});q.onsuccess=()=>res();q.onerror=()=>rej(q.error);})),
    get:k=>tx('readonly').then(s=>new Promise((res,rej)=>{const q=s.get(k);q.onsuccess=()=>res(q.result&&q.result.v);q.onerror=()=>rej(q.error);}))};
})();

const $=s=>document.querySelector(s);
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const pad2=n=>String(n).padStart(2,'0');
function toast(m){const t=$('#toast');t.textContent=m;t.classList.remove('hidden');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.add('hidden'),2600);}
function show(s){['cap','rec'].forEach(x=>$('#screen-'+x).classList.toggle('hidden',x!==s));window.scrollTo(0,0);}

/* ===== session ===== */
let S=null;
function blank(){const d=new Date();return{createdAt:Date.now(),
  site:'Private residence, Kampung Pandan Dalam, Ampang',inspector:'Mr Vin',project:'ST-2025-053',
  lab:'Faculty of Science & Technology, UKM',stage:'Baseline, pre-remediation',
  date:d.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}),
  gps:null,samples:[],sigCol:null,sigRec:null,recName:''};}
async function load(){S=await DB.get('session')||blank();await save();}
async function save(){S.updatedAt=Date.now();await DB.put('session',S);}
async function resetSession(){if(!confirm('Start a new record? The current samples will be cleared.'))return;S=blank();await save();renderAll();toast('New record started');}

/* ===== GPS ===== */
const Geo={last:null,refresh(){return new Promise(res=>{if(!navigator.geolocation){res(null);return;}
  navigator.geolocation.getCurrentPosition(p=>{Geo.last={lat:p.coords.latitude,lng:p.coords.longitude,acc:Math.round(p.coords.accuracy||0),t:Date.now()};res(Geo.last);},
  ()=>res(Geo.last),{enableHighAccuracy:true,timeout:8000,maximumAge:15000});});},
  async get(){if(Geo.last&&Date.now()-Geo.last.t<30000)return Geo.last;return await Geo.refresh();}};

/* ===== camera + resize + stamp ===== */
let _camCb=null,_camOpts={};
$('#cam').addEventListener('change',async e=>{const f=e.target.files&&e.target.files[0];e.target.value='';if(!f||!_camCb)return;
  toast('Processing photo…');try{const d=await fileToDataUrl(f,_camOpts);_camCb(d);}catch(err){toast('Photo error: '+err.message);}_camCb=null;});
function shoot(cb,opts={}){_camCb=cb;_camOpts=opts;$('#cam').click();}
function loadImg(file){return new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=URL.createObjectURL(file);});}
async function fileToDataUrl(file,opts={}){const maxDim=opts.maxDim||1568,q=opts.q||0.85;
  let bmp;try{bmp=await createImageBitmap(file,{imageOrientation:'from-image'});}catch(e){bmp=await loadImg(file);}
  const w=bmp.width,h=bmp.height,sc=Math.min(1,maxDim/Math.max(w,h));
  const cw=Math.max(1,Math.round(w*sc)),ch=Math.max(1,Math.round(h*sc));
  const cv=document.createElement('canvas');cv.width=cw;cv.height=ch;const ctx=cv.getContext('2d');ctx.drawImage(bmp,0,0,cw,ch);
  if(bmp.close)bmp.close();
  if(opts.stamp){const g=await Geo.get();stampPhoto(ctx,cw,ch,g,opts.addr,opts.sid);}
  return cv.toDataURL('image/jpeg',q);}
function stampPhoto(ctx,cw,ch,g,addr,sid){
  const fs=Math.max(13,Math.round(cw*0.028)),pad=Math.round(cw*0.022),lh=Math.round(fs*1.5);
  const lines=[];if(sid)lines.push('Sample '+sid+(addr?'   ·   '+addr:''));else if(addr)lines.push(addr);
  lines.push(g?(g.lat.toFixed(6)+', '+g.lng.toFixed(6)+'   ±'+g.acc+'m'):'GPS unavailable');
  const d=new Date();lines.push(d.toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})+'   ·   Cleanaholics · CH Swab');
  const band=lh*lines.length+pad*1.7;
  ctx.fillStyle='rgba(10,8,5,0.60)';ctx.fillRect(0,ch-band,cw,band);
  ctx.fillStyle='#C6A861';ctx.fillRect(0,ch-band,cw,Math.max(2,Math.round(cw*0.0045)));
  ctx.textBaseline='top';
  lines.forEach((t,i)=>{ctx.font=(i===0?'700 ':'600 ')+fs+'px -apple-system,Helvetica,Arial,sans-serif';
    ctx.fillStyle=i===0?'#F5F0E6':i===1?'#EBDBAB':'#D2C6A8';ctx.fillText(t,pad,ch-band+pad+i*lh);});}

/* ===== add / edit sample ===== */
function nextSid(){return 'S-'+pad2(S.samples.length+1);}
function addSwab(){const sid=nextSid();
  shoot(async d=>{const t=new Date();
    const smp={id:Date.now().toString(36),sid,photo:d,room:'',surface:'',desc:'',moisture:'',
      time:t.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})};
    S.samples.push(smp);await save();renderSamples();editSample(smp.id);
  },{stamp:true,addr:(S.site||'').split(',')[0],sid});}
function editSample(id){const s=S.samples.find(x=>x.id===id);if(!s)return;
  sheet('Sample '+s.sid,`
    <div class="field"><label>Location / room</label><input id="e-room" value="${esc(s.room)}" placeholder="e.g. Master bedroom, ceiling corner"></div>
    <div class="field"><label>Surface / material</label><input id="e-surf" value="${esc(s.surface)}" placeholder="e.g. Plaster ceiling"></div>
    <div class="field"><label>Visual description (colour, extent)</label><textarea id="e-desc" rows="2" placeholder="e.g. Black spotting, ~20cm patch">${esc(s.desc)}</textarea></div>
    <div class="row2">
      <div class="field"><label>Moisture reading</label><input id="e-moist" value="${esc(s.moisture)}" inputmode="decimal" placeholder="e.g. 28 / Wet"></div>
      <div class="field"><label>Time</label><input id="e-time" value="${esc(s.time)}"></div>
    </div>
    <button class="btn primary" onclick="saveSample('${id}')">Save sample</button>`);
  setTimeout(()=>$('#e-room')&&$('#e-room').focus(),60);}
async function saveSample(id){const s=S.samples.find(x=>x.id===id);if(!s)return;
  s.room=$('#e-room').value.trim();s.surface=$('#e-surf').value.trim();s.desc=$('#e-desc').value.trim();
  s.moisture=$('#e-moist').value.trim();s.time=$('#e-time').value.trim();
  closeSheet();await save();renderSamples();toast('Sample '+s.sid+' saved ✓');}
async function delSample(id){if(!confirm('Remove this sample?'))return;
  S.samples=S.samples.filter(x=>x.id!==id);
  S.samples.forEach((s,i)=>s.sid='S-'+pad2(i+1)); // renumber
  await save();renderSamples();}

/* ===== details ===== */
function editDetails(){
  sheet('Sampling details',`
    <div class="field"><label>Site (kept anonymous on the record)</label><input id="d-site" value="${esc(S.site)}"></div>
    <div class="row2">
      <div class="field"><label>Inspector</label><input id="d-insp" value="${esc(S.inspector)}"></div>
      <div class="field"><label>Project ref</label><input id="d-proj" value="${esc(S.project)}"></div>
    </div>
    <div class="field"><label>Analysing laboratory</label><input id="d-lab" value="${esc(S.lab)}"></div>
    <div class="row2">
      <div class="field"><label>Stage</label><input id="d-stage" value="${esc(S.stage)}"></div>
      <div class="field"><label>Date</label><input id="d-date" value="${esc(S.date)}"></div>
    </div>
    <button class="btn primary" onclick="saveDetails()">Save</button>`);}
async function saveDetails(){S.site=$('#d-site').value.trim();S.inspector=$('#d-insp').value.trim();S.project=$('#d-proj').value.trim();
  S.lab=$('#d-lab').value.trim();S.stage=$('#d-stage').value.trim();S.date=$('#d-date').value.trim();
  closeSheet();await save();renderHeader();toast('Details saved');}
async function setRec(v){S.recName=v.trim();await save();}

/* ===== render ===== */
function renderAll(){renderHeader();renderGps();renderSamples();$('#rec-name').value=S.recName||'';loadSig('col',S.sigCol);loadSig('rec',S.sigRec);}
function renderHeader(){$('#cap-site').textContent=S.site?S.site.split(',')[0]:'Swab sampling';
  $('#cap-meta').textContent=[S.stage,S.project,S.date].filter(Boolean).join('  ·  ');}
function renderGps(){const g=S.gps;
  $('#gps').innerHTML=`<div class="gpsbar"><div class="pin">📍 ${g?esc(g.lat.toFixed(5)+', '+g.lng.toFixed(5))+' <small>(±'+g.acc+'m)</small>':'<small>Location not pinned yet</small>'}</div>`
    +(g?`<a href="https://maps.google.com/?q=${g.lat},${g.lng}" target="_blank" rel="noopener">map</a>`:'')
    +`<button class="gpsbtn" onclick="pinGps()">${g?'Update':'Pin'}</button></div>`;}
async function pinGps(){toast('Getting GPS…');const g=await Geo.refresh();if(g){S.gps=g;await save();renderGps();toast('Location pinned ✓');}else toast('Allow location access to pin.');}
function renderSamples(){const host=$('#samples');host.innerHTML='';
  $('#samp-empty').classList.toggle('hidden',S.samples.length>0);
  $('#samp-count').textContent=S.samples.length?S.samples.length+' captured':'';
  S.samples.forEach(s=>{const el=document.createElement('div');el.className='samp';
    el.innerHTML=`<img src="${s.photo}" onclick="editSample('${s.id}')">
      <div class="d" onclick="editSample('${s.id}')">
        <div class="sid">${esc(s.sid)}</div>
        <div class="loc">${esc(s.room||'Tap to add location')}</div>
        <div class="sub2">${esc(s.surface||'')}${s.surface&&s.desc?' · ':''}${esc(s.desc||'')}</div>
        ${s.moisture?`<span class="tag">Moisture ${esc(s.moisture)}</span> `:''}<span class="tag">${esc(s.time||'')}</span>
      </div>
      <button class="del" onclick="delSample('${s.id}')">Remove</button>`;
    host.appendChild(el);});}

/* ===== signature pads ===== */
const SIG={};
function initSig(which,id){const cv=$('#'+id);const ctx=cv.getContext('2d');
  const rz=()=>{const r=cv.getBoundingClientRect();const dpr=window.devicePixelRatio||1;
    const data=cv._has?cv.toDataURL():null;cv.width=Math.round(r.width*dpr);cv.height=Math.round(r.height*dpr);
    ctx.scale(dpr,dpr);ctx.lineWidth=2.2;ctx.lineCap='round';ctx.lineJoin='round';ctx.strokeStyle='#14110C';
    if(data&&cv._has){const im=new Image();im.onload=()=>ctx.drawImage(im,0,0,r.width,r.height);im.src=data;}};
  setTimeout(rz,0);
  let drawing=false,px=0,py=0;
  const pos=e=>{const r=cv.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};};
  const start=e=>{e.preventDefault();drawing=true;const p=pos(e);px=p.x;py=p.y;};
  const move=e=>{if(!drawing)return;e.preventDefault();const p=pos(e);ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(p.x,p.y);ctx.stroke();px=p.x;py=p.y;cv._has=true;};
  const end=async()=>{if(!drawing)return;drawing=false;if(cv._has){S[which==='col'?'sigCol':'sigRec']=cv.toDataURL('image/png');await save();}};
  cv.addEventListener('mousedown',start);cv.addEventListener('mousemove',move);addEventListener('mouseup',end);
  cv.addEventListener('touchstart',start,{passive:false});cv.addEventListener('touchmove',move,{passive:false});cv.addEventListener('touchend',end);
  SIG[which]={cv,ctx};}
function loadSig(which,data){const o=SIG[which];if(!o||!data)return;const cv=o.cv,ctx=o.ctx;const r=cv.getBoundingClientRect();
  const im=new Image();im.onload=()=>{ctx.clearRect(0,0,cv.width,cv.height);ctx.drawImage(im,0,0,r.width,r.height);cv._has=true;};im.src=data;}
async function clearSig(which){const o=SIG[which];if(!o)return;o.ctx.clearRect(0,0,o.cv.width,o.cv.height);o.cv._has=false;
  S[which==='col'?'sigCol':'sigRec']=null;await save();}

/* ===== modal ===== */
function sheet(title,html){$('#modal-host').innerHTML=`<div class="modal" onclick="if(event.target===this)closeSheet()"><div class="sheet"><h3>${esc(title)}</h3>${html}</div></div>`;}
function closeSheet(){$('#modal-host').innerHTML='';}

/* ===== record ===== */
function buildRecord(){
  if(!S.samples.length){toast('Capture at least one swab first.');return;}
  const rows=S.samples.map(s=>`<tr><td class="sid">${esc(s.sid)}</td><td>${esc(s.room||'—')}</td><td>${esc(s.surface||'—')}</td><td>${esc(s.desc||'—')}</td><td>${esc(s.moisture||'—')}</td><td>${esc(s.time||'—')}</td></tr>`).join('');
  const photos=S.samples.map(s=>`<figure><img src="${s.photo}"><figcaption>${esc(s.sid)} · ${esc(s.room||'')}</figcaption></figure>`).join('');
  const gps=S.gps?`${S.gps.lat.toFixed(6)}, ${S.gps.lng.toFixed(6)} (±${S.gps.acc}m)`:'—';
  const sig=(data,name,role)=>`<div class="coc"><div class="cock">${role}</div>${data?`<img class="cocsig" src="${data}">`:`<div class="cocsig empty"></div>`}<div class="cocn">${esc(name||'')}</div></div>`;
  const html=`<div id="record" class="rec">
    <div class="rhead">
      <div class="rtop"><img class="rcoin" src="./assets/coin_gold.png"><div><div class="rbrand">CLEANAHOLICS</div><div class="rtag">The Doctor for Houses &amp; Buildings</div></div>
        <div class="rrec">Field Sampling Record<br><b>CH-FSR</b> · ${esc(S.date)}</div></div>
    </div>
    <div class="rbody">
      <div class="rmeta">
        <div><span>Site</span>${esc(S.site||'—')}</div><div><span>Sampling by</span>${esc(S.inspector||'—')}</div>
        <div><span>Project</span>${esc(S.project||'—')}</div><div><span>Laboratory</span>${esc(S.lab||'—')}</div>
        <div><span>Stage</span>${esc(S.stage||'—')}</div><div><span>Location · GPS</span>${gps}</div>
      </div>
      <h3>Samples collected</h3>
      <table class="rt"><tr><th>ID</th><th>Location / room</th><th>Surface</th><th>Description</th><th>Moisture</th><th>Time</th></tr>${rows}</table>
      <h3>Sample photographs</h3>
      <div class="rcards">${photos}</div>
      <h3>Chain of custody</h3>
      <div class="cocwrap">${sig(S.sigCol,S.inspector+' · Senior Hygiene Inspector','Collected by · Cleanaholics')}${sig(S.sigRec,S.recName,'Received by · UKM')}</div>
      <p class="rfoot">Samples collected under aseptic technique, sealed and labelled on site, transported to the laboratory the same day. Recorded with CH Swab. Cleanaholics Sdn Bhd · SSM 201801016647 · WhatsApp 012-847 7669.</p>
    </div></div>`;
  $('#rec-host').innerHTML=recCSS()+html;show('rec');}

  .rcards{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px;}
  .rcards figure{margin:0;width:150px;}.rcards img{width:150px;height:120px;object-fit:cover;border-radius:5px;border:1px solid #e3dcc9;display:block;}
  .rcards figcaption{font-size:10.5px;color:#5d5440;margin-top:4px;font-family:-apple-system,sans-serif;}
  .cocwrap{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:6px;}
  .coc .cock{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#A2823B;font-family:-apple-system,sans-serif;margin-bottom:6px;}
  .cocsig{width:100%;height:70px;object-fit:contain;border-bottom:1.2px solid #23201a;background:#fff;}
  .cocsig.empty{border-bottom:1.2px solid #23201a;}
  .cocn{font-size:11.5px;color:#3a3327;margin-top:5px;font-family:-apple-system,sans-serif;}
  .rfoot{margin-top:22px;font-size:10.5px;color:#8a7f63;border-top:1px solid #e3dcc9;padding-top:12px;font-family:-apple-system,sans-serif;line-height:1.6;}
  @media print{body *{visibility:hidden;}#screen-rec,#screen-rec *{visibility:visible;}#screen-rec{position:absolute;inset:0;}.bar{display:none!important;}.rec{border-radius:0;}}
</style>`;}
async function exportPdf(){toast('Building PDF…');
  try{if(!window.html2pdf){await loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js');}
    const el=$('#record');
    await html2pdf().set({margin:0,filename:`FieldSamplingRecord-${(S.date||'').replace(/\s+/g,'-')}.pdf`,
      image:{type:'jpeg',quality:.92},html2canvas:{scale:2,useCORS:true,backgroundColor:'#fff'},
      jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},pagebreak:{mode:['css','legacy']}}).from(el).save();
  }catch(e){toast('PDF needs a connection the first time. Use Print as a fallback.');}}
function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=()=>rej(new Error('load failed'));document.head.appendChild(s);});}

/* generate button lives on record screen; add a generate action to the FAB long area */
